<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MiWITNESS Documentation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f9f9f9;
    }
    header {
      background: #333;
      color: #fff;
      padding: 1em;
      text-align: center;
    }
    nav {
      background: #222;
      overflow: hidden;
    }
    nav ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
    }
    nav li {
      float: left;
      position: relative;
    }
    nav li a, nav li button {
      display: block;
      color: #fff;
      text-decoration: none;
      padding: 1em 1.5em;
      background: none;
      border: none;
      cursor: pointer;
    }
    nav li:hover > a, nav li:hover > button {
      background: #444;
    }
    nav li ul {
      display: none;
      position: absolute;
      background: #444;
      min-width: 180px;
      z-index: 1;
    }
    nav li:hover ul {
      display: block;
    }
    nav li ul li {
      float: none;
    }
    nav li ul li a {
      padding: 1em;
    }
    main {
      padding: 2em;
      background: #fff;
      max-width: 900px;
      margin: 2em auto;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    @media (max-width: 600px) {
      nav ul, nav li { float: none; width: 100%; }
      nav li ul { position: static; }
    }
  </style>
</head>
<body>
  <header>
    <h1>MiWITNESS Documentation</h1>
