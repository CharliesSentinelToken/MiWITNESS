<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiWitness Legal Assistant</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: Calibri, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f8f9fa;
    }
    .chat-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      background-color: #1a202c;
      color: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    #chat-window {
      background: #ffffff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      height: 400px;
      overflow-y: scroll;
    }
    #chat-form {
      display: flex;
      margin-top: 20px;
    }
    #user-input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }
    button {
      background-color: #3182ce;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    .chat-message {
      margin-bottom: 15px;
    }
    .user {
      color: #2b6cb0;
      font-weight: bold;
    }
    .bot {
      color: #1a202c;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <header>
      <h1>MiWitness: Legal Justice Assistant</h1>
      <p>Ask about your rights, case status, or generate legal complaints.</p>
    </header><main id="chat-window"></main>

<form id="chat-form">
  <input type="text" id="user-input" placeholder="Ask a legal question..." required />
  <button type="submit">Send</button>
</form>

  </div>  <script>
    const chatWindow = document.getElementById('chat-window');
    const form = document.getElementById('chat-form');
    const input = document.getElementById('user-input');

    form.onsubmit = async (e) => {
      e.preventDefault();
      const userText = input.value;
      appendMessage('user', userText);
      input.value = '';

      appendMessage('bot', 'Thinking...');

      const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer demo',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: 'openai/gpt-4',
          messages: [
            { role: 'system', content: 'You are a legal assistant chatbot built for miwitness.org. You answer questions based strictly on UK law, ECHR, and the legal blueprint for the Charlie Burgoyne case. You must cite relevant law or document references when answering.' },
            { role: 'user', content: userText }
          ]
        })
      });

      const data = await response.json();
      const botReply = data.choices?.[0]?.message?.content || 'An error occurred.';

      chatWindow.lastChild.remove();
      appendMessage('bot', botReply);
    };

    function appendMessage(sender, text) {
      const div = document.createElement('div');
      div.className = `chat-message ${sender}`;
      div.innerHTML = `<strong class="${sender}">${sender === 'user' ? 'You' : 'MiWitness Bot'}:</strong> ${text}`;
      chatWindow.appendChild(div);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }
  </script></body>
</html>
