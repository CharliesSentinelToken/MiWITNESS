<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiWitness Legal Assistant</title>
  <style>
    body {
      font-family: Calibri, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #1a1a1a;
      color: #f0f0f0;
    }
    .chat-container {
      max-width: 850px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #1a1a1a;
      border-bottom: 2px solid #ffa500;
      padding: 20px 0;
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #ffa500;
    }
    .tagline {
      font-size: 16px;
      color: #ccc;
    }
    #chat-window {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 20px;
      height: 400px;
      overflow-y: scroll;
      margin-top: 20px;
    }
    #chat-form {
      display: flex;
      margin-top: 20px;
    }
    #user-input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      background-color: #333;
      border: none;
      color: #fff;
    }
    button {
      background-color: #ffa500;
      color: black;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    .chat-message {
      margin-bottom: 15px;
    }
    .user {
      color: #87cefa;
      font-weight: bold;
    }
    .bot {
      color: #f0f0f0;
    }
    footer {
      display: flex;
      justify-content: space-around;
      margin-top: 30px;
      padding: 15px;
      background-color: #121212;
      border-top: 1px solid #333;
    }
    footer button {
      background-color: #444;
      color: #ffa500;
      border: 1px solid #ffa500;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <header>
      <div class="logo">MiWITNESS</div>
      <div class="tagline">Legal Rights & Complaint Assistant</div>
    </header><main id="chat-window"></main>

<form id="chat-form">
  <input type="text" id="user-input" placeholder="Ask a legal question..." required />
  <button type="submit">Send</button>
</form>

<footer>
  <button onclick="alert('Complaint generator coming soon.')">📤 Send Complaint</button>
  <button onclick="alert('View case documents under construction.')">🧾 Case Files</button>
  <button onclick="alert('Need urgent help? Contact 116 123 or seek emergency legal aid.')">🆘 Help</button>
</footer>

  </div>  <script>
    const chatWindow = document.getElementById('chat-window');
    const form = document.getElementById('chat-form');
    const input = document.getElementById('user-input');

    form.onsubmit = async (e) => {
      e.preventDefault();
      const userText = input.value;
      appendMessage('user', userText);
      input.value = '';

      appendMessage('bot', 'Thinking...');

      const response = await fetch('https://api.perplexity.ai/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer YOUR_PERPLEXITY_API_KEY',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: 'llama-3-sonar-large-32k-online',
          messages: [
            { role: 'system', content: 'You are a UK legal assistant chatbot for miwitness.org. Answer based only on the Charlie Burgoyne legal blueprint, UK law, and human rights statutes. Cite documents or law when relevant.' },
            { role: 'user', content: userText }
          ]
        })
      });

      const data = await response.json();
      const botReply = data.choices?.[0]?.message?.content || 'An error occurred.';

      chatWindow.lastChild.remove();
      appendMessage('bot', botReply);
    };

    function appendMessage(sender, text) {
      const div = document.createElement('div');
      div.className = `chat-message ${sender}`;
      div.innerHTML = `<strong class="${sender}">${sender === 'user' ? 'You' : 'MiWitness Bot'}:</strong> ${text}`;
      chatWindow.appendChild(div);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }
  </script></body>
</html>
