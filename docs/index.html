<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiWITNESS | Legal Rights & Complaint Assistant</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #1a1a1a;
      color: #f0f0f0;
      font-family: Calibri, sans-serif;
    }
    header {
      background-color: #1a1a1a;
      padding: 16px 24px;
      border-bottom: 2px solid #FFA500;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #FFA500;
    }
    .tagline {
      font-size: 14px;
      color: #ccc;
    }
    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    #chat-window {
      width: 100%;
      max-width: 800px;
      height: 400px;
      background-color: #2a2a2a;
      border: 1px solid #444;
      border-radius: 10px;
      overflow-y: scroll;
      padding: 16px;
      box-sizing: border-box;
    }
    .chat-message {
      margin-bottom: 12px;
    }
    .user {
      color: #00b7ff;
      font-weight: bold;
    }
    .bot {
      color: #ffffff;
    }
    form {
      display: flex;
      width: 100%;
      max-width: 800px;
      margin-top: 16px;
    }
    #user-input {
      flex-grow: 1;
      padding: 12px;
      font-size: 16px;
      border: none;
      background-color: #333;
      color: #fff;
    }
    button {
      padding: 12px 20px;
      background-color: #FFA500;
      color: #000;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    footer {
      display: flex;
      justify-content: center;
      margin-top: 30px;
      gap: 20px;
    }
    footer button {
      background-color: #333;
      color: #FFA500;
      border: 1px solid #FFA500;
      padding: 10px 16px;
      font-size: 14px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">MiWITNESS</div>
    <div class="tagline">Legal Rights & Complaint Assistant</div>
  </header>  <div class="main">
    <div id="chat-window"></div><form id="chat-form">
  <input type="text" id="user-input" placeholder="Ask a legal question..." required />
  <button type="submit">Send</button>
</form>

<footer>
  <button onclick="alert('Complaint generator will activate here.')">📤 Send Complaint</button>
  <button onclick="alert('Emergency help section placeholder.')">🆘 Help</button>
  <button onclick="alert('Key victim rights under UK law.')">⚖️ Rights</button>
</footer>

  </div>  <script>
    const chatWindow = document.getElementById('chat-window');
    const form = document.getElementById('chat-form');
    const input = document.getElementById('user-input');

    form.onsubmit = async (e) => {
      e.preventDefault();
      const userText = input.value;
      appendMessage('user', userText);
      input.value = '';
      appendMessage('bot', 'Thinking...');

      try {
        const response = await fetch('https://api.perplexity.ai/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer YOUR_PERPLEXITY_API_KEY',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: 'llama-3-sonar-large-32k-online',
            messages: [
              {
                role: 'system',
                content: 'You are MiWitness Legal Assistant. Only respond using verified UK law, Victims Code, ECHR, and Charlie Burgoyne legal blueprint. Give direct legal answers and instructions.'
              },
              { role: 'user', content: userText }
            ]
          })
        });
        const data = await response.json();
        const botReply = data.choices?.[0]?.message?.content || 'No reply.';
        chatWindow.lastChild.remove();
        appendMessage('bot', botReply);
      } catch (err) {
        chatWindow.lastChild.remove();
        appendMessage('bot', 'Error: Unable to reach AI service.');
      }
    };

    function appendMessage(sender, text) {
      const div = document.createElement('div');
      div.className = `chat-message ${sender}`;
      div.innerHTML = `<strong>${sender === 'user' ? 'You' : 'MiWitness Bot'}:</strong> ${text}`;
      chatWindow.appendChild(div);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }
  </script></body>
</html>
