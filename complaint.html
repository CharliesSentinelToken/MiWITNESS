<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>miwitness | Home</title>
  <style>
    body {
      margin: 0;
      font-family: Calibri, sans-serif;
      background: white;
      color: #222;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      flex-wrap: wrap;
    }
    .brand a {
      text-decoration: none;
      color: black;
      font-size: 1.6em;
      font-weight: bold;
    }
    .brand a span {
      color: orange;
    }
    .quote {
      font-size: 0.9em;
      font-style: italic;
      color: #222;
      max-width: 260px;
      text-align: right;
    }
    .quote span {
      color: orange;
      font-size: 1.4em;
      font-weight: bold;
    }
    .main-buttons {
      display: flex;
      justify-content: center;
      margin: 60px 0;
    }
    .main-buttons a {
      background: orange;
      color: white;
      text-decoration: none;
      padding: 14px 22px;
      font-weight: bold;
      font-size: 1em;
      border-radius: 5px;
    }
    footer {
      background: #2d2626;
      color: white;
      font-size: 0.9em;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      box-sizing: border-box;
    }
    .footer-link {
      color: white;
      text-decoration: underline;
      font-weight: bold;
    }
    .footer-center {
      text-align: center;
      flex: 1;
    }
    .footer-left, .footer-right {
      flex: 0;
    }
    @media (max-width: 600px) {
      footer {
        flex-direction: column;
        text-align: center;
      }
      .footer-left, .footer-right {
        margin: 6px 0;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <a href="home.html"><span>●</span> MIWITNESS</a>
    </div>
    <div class="quote">
      <span>“</span>It performs to protect until<br>you need its protection<span>”</span>
    </div>
  </header>  <div class="main-buttons">
    <a href="complaint.html">Complaint Assistant</a>
  </div>  <footer>
    <div class="footer-left">
      <a href="disclaimer.html" class="footer-link">DISCLAIMER</a>
    </div>
    <div class="footer-center">miwitness.org &copy;2025</div>
    <div class="footer-right">
      <a href="privacy.html" class="footer-link">Privacy Notice</a>
    </div>
  </footer>
</body>
</html>
