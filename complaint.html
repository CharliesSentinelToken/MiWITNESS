<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>miwitness Complaint Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; font-family: Calibri, sans-serif; background: #fff; color: #222; display: flex; flex-direction: column; min-height: 100vh;}
    header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; flex-wrap: wrap; }
    .brand a { text-decoration: none; color: black; font-size: 1.6em; font-weight: bold; }
    .brand a span { color: orange; }
    .quote { font-size: 0.9em; font-style: italic; color: #222; max-width: 260px; text-align: right; }
    .quote span { color: orange; font-size: 1.4em; font-weight: bold; }
    nav { background: #2d2626; display: flex; justify-content: center; align-items: center; padding: 10px 0; flex-wrap: wrap;}
    nav a { color: white; text-decoration: none; font-weight: bold; margin: 0 15px; padding: 6px 12px; border-radius: 4px;}
    nav a:hover { background: orange; color: #2d2626;}
    .dropdown { position: relative; display: inline-block;}
    .dropdown-content { display: none; position: absolute; background-color: #2d2626; min-width: 160px; z-index: 1;}
    .dropdown-content a { color: white; padding: 10px 14px; display: block;}
    .dropdown:hover .dropdown-content { display: block;}
    main { flex: 1; padding: 20px; max-width: 900px; margin: auto;}
    #chatbox { border: 1px solid #ccc; padding: 15px; height: 350px; overflow-y: auto; margin-bottom: 15px; background: #f7f7f7; border-radius: 6px;}
    #chatbox .msg { margin: 10px 0;}
    #chatbox .user { text-align: right; font-weight: bold; color: #222;}
    #chatbox .ai { text-align: left; color: orange;}
    #finalMessage { width: 100%; margin-top: 8px; padding: 10px; font-size: 1em; border-radius: 4px; border: 1px solid #ccc;}
    input, textarea, button { font-size: 1em; padding: 10px; margin-top: 8px;}
    button { background: orange; color: white; border: none; border-radius: 4px; cursor: pointer;}
    footer { background: #2d2626; color: white; padding: 10px 20px; font-size: 0.85em; text-align: center;}
    @media (max-width: 700px) {
      header, main { padding: 8px; }
      #chatbox { height: 250px; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
</head>
<body>
  <header>
    <div class="brand">
      <a href="home.html"><span>●</span> MIWITNESS</a>
    </div>
    <div class="quote">
      <span>“</span>It performs to protect until<br>you need its protection<span>”</span>
    </div>
  </header>
  <nav>
    <a href="complaint.html" style="background: orange; padding: 10px 16px; border-radius: 4px; font-weight: bold; color: #2d2626;">Complaint Assistant</a>
    <div class="dropdown">
      <a href="#">More</a>
      <div class="dropdown-content">
        <a href="about.html">About</a>
        <a href="terms.html">Terms & Conditions</a>
        <a href="faq.html">FAQ</a>
        <a href="disclaimer.html">Disclaimer</a>
      </div>
    </div>
  </nav>
  <main>
    <h1>Legal AI Complaint Assistant</h1>
    <div id="chatbox"></div>
    <input id="userInput" placeholder="Describe your issue or ask for a complaint letter..." />
    <button onclick="sendMessage()">Send</button>
    <form id="sendForm" style="margin-top:22px;">
      <h3>Email This Complaint</h3>
      <input type="email" id="fromEmail" placeholder="Your Email (proof copy)" required />
      <input type="email" id="toEmail" placeholder="Recipient Email" required />
      <textarea id="finalMessage" placeholder="Paste or edit your complaint here..." rows="8" required></textarea>
      <button type="submit">Send Complaint</button>
      <div id="emailResult"></div>
    </form>
  </main>
  <footer>
    miwitness.org &copy;2025
  </footer>
