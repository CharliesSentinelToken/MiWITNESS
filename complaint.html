<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>miwitness Complaint Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Calibri, sans-serif;
      background: white;
      color: #222;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header, nav, footer {
      padding: 12px 20px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .brand a {
      text-decoration: none;
      color: black;
      font-size: 1.6em;
      font-weight: bold;
    }
    .brand a span { color: orange; }
    .quote {
      font-size: 0.9em;
      font-style: italic;
      max-width: 260px;
      text-align: right;
    }
    .quote span { color: orange; font-size: 1.4em; font-weight: bold; }
    nav {
      background: #2d2626;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }
    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      margin: 0 15px;
      padding: 6px 12px;
      border-radius: 4px;
    }
    nav a:hover { background: orange; color: #2d2626; }
    .dropdown {
      position: relative;
      display: inline-block;
    }
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #2d2626;
      min-width: 160px;
      z-index: 1;
    }
    .dropdown-content a {
      color: white;
      padding: 10px 14px;
      display: block;
    }
    .dropdown:hover .dropdown-content { display: block; }
    main {
      flex: 1;
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }
    iframe {
      width: 100%;
      height: 500px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .output-box {
      background: #f9f9f9;
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      white-space: pre-wrap;
    }
    label, input, textarea, button {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      font-size: 1em;
    }
    button {
      background: orange;
      color: #fff;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
    }
    footer {
      background: #2d2626;
      color: white;
      font-size: 0.85em;
      text-align: center;
      padding: 10px 20px;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <a href="home.html"><span>●</span> MIWITNESS</a>
    </div>
    <div class="quote">
      <span>“</span>It performs to protect until<br>you need its protection<span>”</span>
    </div>
  </header>
  <nav>
    <a href="complaint.html" style="background: orange; padding: 10px 16px; border-radius: 4px; font-weight: bold; color: #2d2626;">Complaint Assistant</a>
    <div class="dropdown">
      <a href="#">More</a>
      <div class="dropdown-content">
        <a href="about.html">About</a>
        <a href="terms.html">Terms & Conditions</a>
        <a href="faq.html">FAQ</a>
        <a href="disclaimer.html">Disclaimer</a>
      </div>
    </div>
  </nav>
  <main>
    <h1>AI Legal Complaint Assistant</h1>
    <iframe src="https://huggingface.co/spaces/OpenAssistant/oasst-chat" title="AI Chat"></iframe><div class="output-box" id="outputBox" contenteditable="true">
  Paste the AI-generated complaint letter here for sending.
</div>

<form id="emailForm">
  <label>Your Email (proof copy)</label>
  <input type="email" name="from_email" required />
  <label>Recipient Email (organisation)</label>
  <input type="email" name="to_email" required />
  <label>Complaint Message</label>
  <textarea name="message" rows="8" required></textarea>
  <input type="hidden" name="title" value="miwitness Complaint" />
  <input type="hidden" name="ref_id" value="MW-${Date.now()}" />
  <button type="submit">Send My Complaint</button>
</form>

<div id="result"></div>

  </main>
  <footer>
    miwitness.org &copy;2025
  </footer>  <script>
    emailjs.init("hIS3eySFPXc1nNuFa");
    document.getElementById("emailForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const form = e.target;
      form.message.value = document.getElementById("outputBox").innerText;
      emailjs.send("service_kz8yf5h", "template_lnyzqy8", {
        from_email: form.from_email.value,
        to_email: form.to_email.value,
        title: form.title.value,
        message: form.message.value,
        ref_id: form.ref_id.value
      }).then(() => {
        document.getElementById("result").innerText = "Complaint sent and copy emailed.";
        form.reset();
      }).catch(() => {
        document.getElementById("result").innerText = "Failed to send email.";
      });
    });
  </script></body>
</html>
