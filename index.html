<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MiWITNESS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #181818;
    }
    body {
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-width: 100vw;
      overflow: hidden;
    }
    .logo {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 3rem;
      font-weight: bold;
      color: #00bfff;
      margin-bottom: 40px;
      letter-spacing: 0.2em;
      user-select: none;
      text-shadow: 0 4px 24px #00bfff44;
      cursor: pointer;
      z-index: 2;
    }
    .spinner-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }
    .spinner {
      margin-top: 0;
      width: 60px;
      height: 60px;
      border: 8px solid #222;
      border-top: 8px solid #00bfff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 24px #00bfff22;
    }
    @keyframes spin {
      0% { transform: rotate(0deg);}
      100% { transform: rotate(360deg);}
    }
    .hint {
      color: #aaa;
      margin-top: 22px;
      font-size: 1.1rem;
      font-family: Arial, sans-serif;
      letter-spacing: 0.08em;
      opacity: 0.8;
    }
    @media (max-width: 600px) {
      .logo { font-size: 2rem; }
      .spinner { width:40px; height:40px; border-width:6px; }
      .hint { font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <div class="logo" id="logo">
    MiWITNESS
  </div>
  <div class="spinner-container" onclick="goHome()" title="Enter MiWITNESS">
    <div class="spinner"></div>
    <div class="hint">Click to enter</div>
  </div>
  <script>
    // Allow clicking either the logo or spinner to enter home page
    function goHome() {
      window.location.href = 'docs/index.html';
    }
    document.getElementById('logo').addEventListener('click', goHome);
  </script>
</body>
</html>
