<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>miwitness.org</title>
  <style>
    body {
      margin: 0;
      background: #fff;
      font-family: Calibri, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }
    .logo {
      font-size: 1.5em;
      font-weight: bold;
      color: #333;
      margin-bottom: 30px;
    }
    .circle {
      width: 80px;
      height: 80px;
      border: 5px solid orange;
      border-top: 5px solid transparent;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
      margin-bottom: 30px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .enter-button {
      text-decoration: none;
      background: orange;
      color: white;
      padding: 12px 26px;
      border-radius: 6px;
      font-size: 1em;
    }
  </style>
</head>
<body>
  <div class="logo">miwitness</div>
  <div class="circle"></div>
  <a href="home.html" class="enter-button">ENTER</a>
</body>
</html>
