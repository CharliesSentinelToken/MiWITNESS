<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiWITNESS</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }
    h1 {
      font-size: 2em;
      font-weight: 600;
      letter-spacing: 0.1em;
    }
    .highlight {
      color: #f4a300;
    }
    .loader {
      margin-top: 16px;
      width: 30px;
      height: 30px;
      border: 3px solid #f4a300;
      border-top: 3px solid transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <h1>Mi<span class="highlight">WITNESS</span></h1>
  <div class="loader"></div>
</body>
</html>
