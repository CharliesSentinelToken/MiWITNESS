<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiWITNESS</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      height: 100vh;
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .logo {
      font-size: 2.5em;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-align: center;
    }
    .highlight {
      color: #f4a300;
    }
    .loader {
      margin-top: 20px;
      width: 36px;
      height: 36px;
      border: 3px solid #f4a300;
      border-top: 3px solid transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="logo">M<span class="highlight">i</span>WITNESS</div>
  <div class="loader"></div>
</body>
</html>
