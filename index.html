<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>miwitness.org</title>
  <style>
    body {
      margin: 0;
      background: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Calibri, sans-serif;
    }
    .logo-container {
      text-align: center;
      cursor: pointer;
      text-decoration: none;
    }
    .logo-text {
      position: relative;
      font-size: 2em;
      font-weight: bold;
      color: black;
    }
    .logo-text .dot {
      position: absolute;
      width: 10px;
      height: 10px;
      background: orange;
      border-radius: 50%;
      top: -10px;
      left: 12px;
    }
    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid orange;
      border-top: 3px solid transparent;
      border-radius: 50%;
      margin: 25px auto 0;
      animation: spin 1.3s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <a href="home.html" class="logo-container">
    <div class="logo-text">
      <span class="dot"></span>
      MIWITNESS
    </div>
    <div class="spinner"></div>
  </a>
</body>
</html>
